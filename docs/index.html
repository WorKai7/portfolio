<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Vandewalle Jérôme - Portfolio</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Outfit";
        }

        body {
            height: 200vh; /* permet le scroll */
            scroll-behavior: smooth;
            background: linear-gradient(135deg, #1c6bff, #001a8f, #08235e);
            color: white;
            overflow-x: hidden;
        }

        .hero {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            padding: 40px;
        }

        .content {
            display: flex;
            align-items: center;
            gap: 40px;
            max-width: 900px;
        }

        .photo {
            width: 180px;
            height: 180px;
            border-radius: 10px;
            border: 4px solid white;
            box-shadow: 0 0 30px rgba(255,255,255,0.3);
        }

        .text h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        .text p {
            font-size: 1.1rem;
            opacity: 0.85;
            line-height: 1.6;
        }

        .arrow {
            position: absolute;
            bottom: 30px;
            font-size: 2.5rem;
            cursor: pointer;
            animation: bounce 2s infinite;
            opacity: 0.8;
            transition: 0.3s;
        }

        .arrow:hover {
            opacity: 1;
            transform: scale(1.1);
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% { transform: translateY(0); }
            40% { transform: translateY(-15px); }
            60% { transform: translateY(-8px); }
        }

        .scroll-target {
            height: 100vh;
        }

        a {
            color: deepskyblue;
        }

        .flex {
            display: flex;
            justify-content: center;
        }
    </style>
</head>
<body>

    <section class="hero">
        <div class="content">
            <img class="photo" src="images/photo.png" alt="photo">
            <div class="text">
                <h1>Vandewalle Jérôme</h1>
                <p>
                    Étudiant en 3ème année de BUT Informatique passionné par le développement web,
                    d'applications, de jeux vidéos et autres.
                    Bienvenue sur mon portfolio interactif.
                </p>
                <a href="https://jeromevandewalle.wordpress.com/">Pour un portfolio plus classique et moins interactif cliquez sur ce texte</a><br><br><br>
                <a href="https://www.youtube.com/shorts/7JEsWPMe4YY">Mon BUT en 180s</a>
            </div>
        </div>

        <div class="arrow" onclick="scrollToGame()">↓</div>
    </section>

    <div class="scroll-target"></div>

    <script>
        function scrollToGame() {
            window.scrollTo({
                top: window.innerHeight,
                behavior: "smooth"
            });
        }

        window.addEventListener("scroll", () => {
            if (window.scrollY > window.innerHeight * 0.7) {
                window.location.href = "jeu/jeu.html";
            }
        });
    </script>

</body>
</html>
